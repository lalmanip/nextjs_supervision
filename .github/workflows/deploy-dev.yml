# Deploy Supervision (Next.js) to Kubernetes (Dev) on push to `dev`.
# Mirrors vivance-ui's pattern: build → push image → SSH to VPS → kubectl set image → rollout.
#
# Secrets (repo → Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, VPS_HOST, VPS_USER, VPS_SSH_KEY
#
# Optional repo variables (Settings → Secrets and variables → Actions → Variables):
#   SUPERVISION_IMAGE_NAME   default: {DOCKERHUB_USERNAME}/nextjs-supervision
#   SUPERVISION_DEPLOYMENT   default: nextjs-supervision
#   SUPERVISION_CONTAINER    default: nextjs-supervision

on:
  push:
    branches:
      - dev

env:
  IMAGE_TAG: dev-${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker image name
        id: image
        run: |
          if [ -n "${{ vars.SUPERVISION_IMAGE_NAME }}" ]; then
            echo "name=${{ vars.SUPERVISION_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ secrets.DOCKERHUB_USERNAME }}/nextjs-supervision" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ env.IMAGE_TAG }}
            ${{ steps.image.outputs.name }}:dev-latest

      - name: Deploy to Kubernetes (via VPS SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            IMAGE="${{ steps.image.outputs.name }}"
            TAG="${{ env.IMAGE_TAG }}"

            DEPLOYMENT="${{ vars.SUPERVISION_DEPLOYMENT }}"
            CONTAINER="${{ vars.SUPERVISION_CONTAINER }}"

            if [ -z "$DEPLOYMENT" ]; then DEPLOYMENT="nextjs-supervision"; fi
            if [ -z "$CONTAINER" ]; then CONTAINER="nextjs-supervision"; fi

            echo "Deploying to Kubernetes:"
            echo "  deployment: $DEPLOYMENT"
            echo "  container:  $CONTAINER"
            echo "  image:      $IMAGE:$TAG"

            kubectl version --client=true
            kubectl get deployment "$DEPLOYMENT" -o wide

            kubectl set image "deployment/$DEPLOYMENT" \
              "$CONTAINER=$IMAGE:$TAG"

            kubectl annotate "deployment/$DEPLOYMENT" \
              kubernetes.io/change-cause="Deploy dev-${GITHUB_SHA} via GitHub Actions" \
              --overwrite

            kubectl rollout status "deployment/$DEPLOYMENT"
